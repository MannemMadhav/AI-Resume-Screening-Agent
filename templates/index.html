<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AI Resume Screening Agent</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

    <h1>AI Resume Screening Agent</h1>

    <div class="card">

        <form id="resumeForm"
              method="POST"
              enctype="multipart/form-data">

            <div class="upload-box">

                <h2>📄 Upload Resume</h2>

                <input type="file"
                       id="resume"
                       name="resume"
                       accept=".pdf"
                       required>

                <p id="fileName">
                    No file selected
                </p>

            </div>

            <br>

            <label>
                Job Description
            </label>

            <textarea
                name="job_description"
                rows="10"
                placeholder="Paste Job Description Here..."
                required>
            </textarea>

            <br><br>

            <button type="submit">
                Analyze Resume
            </button>

        </form>

    </div>

</div>

<div id="loadingScreen"
     class="loading-screen">

    <div class="loader"></div>

    <h2>Analyzing Resume...</h2>

    <p>
        AI is processing your resume.
    </p>

</div>

<script>

document
.getElementById("resume")
.addEventListener("change", function() {

    if(this.files.length > 0){

        document
        .getElementById("fileName")
        .innerText =
        "Selected: " +
        this.files[0].name;

    }

});

document
.getElementById("resumeForm")
.addEventListener("submit", function() {

    document
    .getElementById("loadingScreen")
    .style.display = "flex";

});

</script>

</body>
</html>
